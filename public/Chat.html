<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat</title>
    <link rel="stylesheet" href="/public/Chat.css">
</head>

<body>
    <ul id="Message"></ul> <!--aqui salen los mensajes-->

    <form id="FormularioChat">
        <input type="text" id="ingresoMensaje" placeholder="Escribe tu mensaje" autocomplete="off">
        <button>Enviar</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>
    <script>

        console.log("Script cargado");

        var socket = io();

        socket.on("connect", () => {
            console.log("Conectado al servidor");
        });
        var socket = io();
        document.getElementById("FormularioChat").addEventListener("submit", function (event) {
            event.preventDefault();
            const mensajeInput = document.getElementById("ingresoMensaje");
            const message = mensajeInput.value;
            if (message) {
                socket.emit("MensajeEnviado", message);
                mensajeInput.value = "";
            }
        });

        socket.on("MensajeRecibido", function (msg) {
            console.log("Mensaje recibido en frontend:", msg);
            var fecha = new Date();
            var horaActual = fecha.getHours();
            var minutos = fecha.getMinutes();
            var mensajes = document.getElementById("Message");
            var item = document.createElement("li");
            item.textContent = horaActual + ":" + minutos + " - " + msg;
            mensajes.appendChild(item);
        });

            }
        });

        function accion() {
            alert("Enviado");
        }*/
    </script>
</body>

</html>
